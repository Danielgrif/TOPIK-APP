<!-- Main Header -->
<header id="main-header">
  <div class="header-left">
    <div class="logo-container">
        <img src="app-logo.svg" alt="Logo" class="header-logo">
    </div>
    <div class="header-branding">
        <span class="brand-main">TOPIK</span>
        <span class="brand-sub">Master</span>
    </div>
    <div id="db-status-indicator" class="db-status" title="Проверка соединения..."></div>
  </div>

  <div class="header-right">
    <!-- XP Widget (Ring) -->
    <button id="xp-level-widget" class="header-stat-item" data-modal-target="stats-modal" title="Статистика" aria-label="Открыть статистику">
        <div class="xp-ring-wrapper">
            <svg class="xp-circular-chart" viewBox="0 0 36 36">
                <path class="xp-circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path id="xp-fill" class="xp-circle-fill" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
            </svg>
            <div class="xp-level-num" id="user-level">1</div>
        </div>
        <div class="xp-meta">
            <span class="xp-label">LVL</span>
            <span id="xp-text" class="xp-val-text">0 XP</span>
        </div>
    </button>

    <button class="coin-pill" data-action="open-shop" title="Магазин">
      <span class="coin-icon">💰</span>
      <span id="coins-count-header">0</span>
    </button>
    
    <button id="profile-button" class="profile-btn-icon" data-action="open-profile" aria-label="Открыть профиль и настройки">
      <div id="profile-avatar" class="profile-avatar">👤</div>
    </button>
  </div>
</header>
