<!-- Collections Management Modal -->
<div id="collections-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📂 Мои списки</h3>
      <button class="btn-icon close-modal-btn" data-close-modal="collections-modal">✕</button>
    </div>
    <div class="modal-body">
      <!-- Create New List -->
      <div class="collection-create-card">
        <div class="section-title-sm" style="margin-bottom: 15px;">✨ Новый список</div>
        <div style="display: flex; gap: 12px; margin-bottom: 15px;">
          <input type="text" id="new-list-icon" placeholder="Emoji" maxlength="2">
          <input type="text" id="new-list-title" placeholder="Название списка">
        </div>
        <div class="collection-options">
          <label class="switch-label">
            <div class="switch">
                <input type="checkbox" id="new-list-public">
                <span class="slider"></span>
            </div>
            <span class="switch-text" style="font-weight: 600;">🌐 Публичный</span>
          </label>
          <button class="btn btn-quiz" data-action="create-list" style="padding: 10px 24px; border-radius: 12px;">➕ Создать</button>
        </div>
      </div>

      <!-- Lists Container -->
      <div id="collections-list" class="collections-list-container">
        <!-- Lists will be injected here -->
      </div>
    </div>
  </div>
</div>

<!-- Edit List Modal -->
<div id="edit-list-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>✏️ Редактировать список</h2>
      <button class="btn-icon close-modal-btn" data-close-modal="edit-list-modal">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-list-id">
      <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="edit-list-icon" class="input" placeholder="Emoji" style="width: 60px; text-align: center;" maxlength="2">
        <input type="text" id="edit-list-title" class="input" placeholder="Название списка" style="flex: 1;">
      </div>
      <button class="btn btn-primary" style="width: 100%;" data-action="save-list-changes">Сохранить</button>
    </div>
  </div>
</div>

<!-- Add To List Modal (Used in ui_card.ts and ui_bulk.ts) -->
<div id="add-to-list-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📂 Добавить в список</h2>
      <button class="btn-icon close-modal-btn" data-close-modal="add-to-list-modal">✕</button>
    </div>
    <div class="modal-body">
      <div id="add-to-list-content" style="display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto;">
        <!-- Checkboxes will be injected here -->
      </div>
    </div>
  </div>
</div>
